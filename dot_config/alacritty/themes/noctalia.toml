# Custom palette
#   Background:  Terracotta  #914059
#   Regular:     White       #FFFFFF  (ANSI 0, 15)
#   Special:     Turquoise   #00B6C2  (ANSI 4, 6, 12, 14)
#   Special:     Dusty Rose       #D0A7AF  (ANSI 3, 7, 11)
#   Special:     Green       #17C182  (ANSI 2, 10)
#   Unobtrusive: Gray        #AA8499  (ANSI 8)
#   Bad/Error:   Gold        #FFA726  (ANSI 1, 9)
#   Accent:      Purple      #cc72fc  (ANSI 5, 13)

[colors.primary]
background = '#914059'
foreground = '#FFFFFF'

[colors.cursor]
cursor = '#00B6C2'
text   = '#FFFFFF'

[colors.selection]
background = '#00B6C2'
text       = '#FFFFFF'

[colors.normal]
black   = '#FFFFFF'  # regular text
red     = '#FFA726'  # gold (bad/error)
green   = '#17C182'  # green
yellow  = '#D0A7AF'  # peach
blue    = '#00B6C2'  # turquoise
magenta = '#cc72fc'  # purple (was: #FFFFFF white)
cyan    = '#00B6C2'  # turquoise
white   = '#D0A7AF'  # peach

[colors.bright]
black   = '#AA8499'  # gray (unobtrusive)
red     = '#FFA726'  # gold (bad/error)
green   = '#17C182'  # green
yellow  = '#D0A7AF'  # peach
blue    = '#00B6C2'  # turquoise
magenta = '#cc72fc'  # purple (was: #FFFFFF white)
cyan    = '#00B6C2'  # turquoise
white   = '#D0A7AF'  # peach
