palette = 'noctalia'

[palettes.noctalia]
color_fg0   = '#F0B6B6'
color_black = '#000000'
color_bg1   = '#D6AA7E'
color_bg3   = '#716E75'
color_blue  = '#1AAAD4'
color_aqua  = '#693638'
color_green = '#A1C4B4'
color_orange = '#ED6D42'
color_purple = '#ED6D42'
color_red   = '#ED6D42'
color_yellow = '#1AAAD4'

[os]
disabled = false
style = "bg:color_orange fg:color_black"

[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = ""
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = ""
CentOS = ""
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_black"
style_root = "bg:color_orange fg:color_black"
format = '[ $user ]($style)'

[directory]
style = "fg:color_black bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ï "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[  $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[container]
style = "bg:color_bg3"
format = '[[ $symbol $name ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1 fg:color_black"
format = '[[  $time ](fg:color_black bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[´É▓](bold fg:color_green)'
error_symbol = '[´É▓](bold fg:color_red)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[´É┤](bold fg:color_yellow)'
