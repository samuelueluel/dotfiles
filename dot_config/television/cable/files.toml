[metadata]
name = "Files"
description = "Browse and open files"

[source]
command = "fd -H -t f . /var/home/samuel/ | awk '{ match($0, /.*\\//); dir = substr($0, 1, RLENGTH); file = substr($0, RLENGTH+1); prefix = \"/var/home/samuel/\"; if (index(dir, prefix) == 1) { rest_dir = substr(dir, length(prefix) + 1); printf \"\\033[38;2;208;167;175m%s\\033[36m%s\\033[0m%s\\n\", prefix, rest_dir, file; } else { printf \"\\033[36m%s\\033[0m%s\\n\", dir, file; } }'"
ansi = true
output = "{strip_ansi}"

[ui]
orientation = "portrait"

[preview]
command = "bat --color=always --style=plain '{strip_ansi}'"

[keybindings]
enter = "actions:open"
alt-space = "actions:open"
ctrl-c = "actions:copy"

[actions.open]
description = "Open with xdg-open"
command = "xdg-open \"{strip_ansi}\""
mode = "execute"

[actions.copy]
description = "Copy to clipboard (stripped)"
command = "printf '%s' \"{strip_ansi}\" | wl-copy"
mode = "fork"

