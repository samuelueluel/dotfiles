[metadata]
name = "Pinned"
description = "Quick access to pinned directories"

[ui]
ui_scale = 80

[source]
command = "/usr/bin/grep -oP '^-\\s+\\K.*' /var/home/samuel/.config/television/pinned.md | /usr/bin/awk '{ gsub(\"/var/home/samuel/\", \"~/\"); match($0, /.*\\//); dir = substr($0, 1, RLENGTH); file = substr($0, RLENGTH+1); printf \"\\033[36m%s\\033[0m%s\\n\", dir, file }'"
ansi = true
output = "{strip_ansi}"

[ui.preview_panel]
hidden = true

[preview]
command = "bash -c 'p=$(sed \"s|^~/|/var/home/samuel/|\" <<< \"$1\"); /home/linuxbrew/.linuxbrew/bin/eza --tree --level 2 --color=always \"$p\"' -- '{strip_ansi}'"

[keybindings]
enter = "actions:open"
ctrl-c = "actions:copy"

[actions.open]
description = "Open in Yazi"
command = "bash -c 'p=$(sed \"s|^~/|/var/home/samuel/|\" <<< \"$1\"); /usr/bin/niri msg action spawn -- /usr/bin/kitty -e /usr/bin/yazi \"$p\"' -- \"{strip_ansi}\""
mode = "execute"

[actions.copy]
description = "Copy to clipboard (full path)"
command = "printf '%s' \"{strip_ansi}\" | sed 's|^~/|/var/home/samuel/|' | wl-copy"
mode = "fork"
