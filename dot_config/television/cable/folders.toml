[metadata]
name = "Directories"
description = "Browse and open folders in Yazi"

[ui.preview_panel]
hidden = true

[ui]
ui_scale = 70

[source]
command = "fd -H -t d . /var/home/samuel/ | awk '{ gsub(\"/var/home/samuel/\", \"~/\"); match($0, /.*\\//); dir = substr($0, 1, RLENGTH); file = substr($0, RLENGTH+1); printf \"\\033[36m%s\\033[0m%s\\n\", dir, file }'"
ansi = true
output = "{strip_ansi}"

[preview]
command = "bash -c 'p=$(sed \"s|^~/|/var/home/samuel/|\" <<< \"$1\"); lsd --tree --depth 2 --color=always \"$p\"' -- '{strip_ansi}'"

[keybindings]
enter = "actions:open"
alt-space = "actions:open"
ctrl-c = "actions:copy"

[actions.open]
description = "Open in Yazi"
command = "bash -c 'p=$(sed \"s|^~/|/var/home/samuel/|\" <<< \"$1\"); niri msg action spawn -- kitty -e yazi \"$p\"' -- \"{strip_ansi}\""
mode = "execute"

[actions.copy]
description = "Copy to clipboard (full path)"
command = "printf '%s' \"{strip_ansi}\" | sed 's|^~/|/var/home/samuel/|' | wl-copy"
mode = "fork"
