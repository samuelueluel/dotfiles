[metadata]
name = "Directories"
description = "Browse and open folders in Yazi"

[ui.preview_panel]
hidden = true

[source]
command = "fd -H -t d . /var/home/samuel/ | awk '{ match($0, /.*\\//); dir = substr($0, 1, RLENGTH); file = substr($0, RLENGTH+1); prefix = \"/var/home/samuel/\"; if (index(dir, prefix) == 1) { rest_dir = substr(dir, length(prefix) + 1); printf \"\\033[38;2;208;167;175m%s\\033[36m%s\\033[0m%s\\n\", prefix, rest_dir, file; } else { printf \"\\033[36m%s\\033[0m%s\\n\", dir, file; } }'"
ansi = true
output = "{strip_ansi}"

[preview]
command = "lsd --tree --depth 2 --color=always '{strip_ansi}'"

[keybindings]
enter = "actions:open"
alt-space = "actions:open"
ctrl-c = "actions:copy"

[actions.open]
description = "Open in Yazi"
command = "niri msg action spawn -- kitty -e yazi \"{strip_ansi}\""
mode = "execute"

[actions.copy]
description = "Copy to clipboard (stripped)"
command = "printf '%s' \"{strip_ansi}\" | wl-copy"
mode = "fork"
