GOOSE_TELEMETRY_ENABLED: true
extensions:
  stata:
    enabled: false
    name: stata
    type: stdio
    cmd: node
    args:
    - /var/home/samuel/.agents/skills/stata/stata-mcp-entry.js
  searxng:
    enabled: true
    name: searxng
    type: stdio
    cmd: /var/home/samuel/.config/goose/searxng-venv/bin/python3
    args:
    - /var/home/samuel/.config/goose/searxng_mcp.py
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  extensionmanager:
    enabled: false
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  skills:
    enabled: false
    type: platform
    name: skills
    description: Discover and provide skill instructions from filesystem and builtins
    display_name: Skills
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  analyze:
    enabled: false
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  developer:
    enabled: true
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  orchestrator:
    enabled: false
    type: platform
    name: orchestrator
    description: 'Manage agent sessions: list, view, start, send messages, interrupt, and stop agents'
    display_name: Orchestrator
    bundled: true
    available_tools: []
  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  summarize:
    enabled: false
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true
    available_tools: []
OPENAI_BASE_URL: http://localhost:8080/v1
OPENAI_HOST: http://localhost:8080
OPENAI_BASE_PATH: v1/chat/completions
OPENAI_TIMEOUT: '600'
active_provider: openai
providers:
  openai:
    enabled: true
    model: unsloth/Qwen3.6-35B-A3B-MTP-GGUF
    api_key: dummy
    configured: true
GOOSE_CLI_THEME: ansi
GOOSE_CLI_DARK_THEME: gruvbox-dark
GOOSE_CLI_SHOW_COST: true
env:
  OPENAI_API_KEY: sk-6869f13e80764e0ab07cb09a9ef5ea98
